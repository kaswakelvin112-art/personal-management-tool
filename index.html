<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Weekly Schedule Manager with Reminders</title>
  </head>
  <body>
    <div class="app-container">
      <div class="app-header">
        <h1>Weekly Schedule Manager</h1>
        <p>with Live Reminders & Countdown Timers</p>
        <div class="current-time" id="currentTime"></div>
      </div>

      <!-- Live Activity Status -->
      <div class="live-activity" id="liveActivity">
        <div class="current-act-container">
          <h3>CURRENTLY</h3>
          <span class="activity-name" id="currentActivity">Loading...</span>
        </div>
        <div class="countdown-timer" id="countdownTimer">--:--:--</div>
        <div class="next-activity" id="nextActivity">
          <h3>NEXT</h3>
          <span id="nextActivityName">Loading...</span> at
          <span id="nextActivityTime">--:--</span>
        </div>
      </div>

      <!-- Notification Panel -->
      <div
        class="notification-panel"
        id="notificationPanel"
        style="display: none"
      >
        <div class="notification-message" id="notificationMessage">
          <span class="icon"></span>
          <span id="notificationText"></span>
        </div>
        <button class="dismiss-btn" onclick="dismissNotification()">✕</button>
      </div>

      <!-- Reminder Settings -->
      <div class="reminder-settings">
        <label>
          <input
            type="checkbox"
            id="enableReminders"
            checked
            onchange="toggleReminders()"
          />
          Enable Reminders
        </label>
        <label>
          Notify me:
          <select id="reminderTime" onchange="updateReminderSettings()">
            <option value="5">5 minutes before</option>
            <option value="10">10 minutes before</option>
            <option value="15" selected>15 minutes before</option>
            <option value="30">30 minutes before</option>
            <option value="60">1 hour before</option>
          </select>
        </label>
        <label>
          <input type="checkbox" id="enableSound" checked />
          Play sound
        </label>
        <label>
          <input type="checkbox" id="showNotifications" checked />
          Show browser notifications
        </label>
      </div>

      <!-- Permission Request -->
      <div
        class="permission-request"
        id="permissionRequest"
        style="display: none"
      >
        <span> Enable notifications to receive reminders</span>
        <button onclick="requestNotificationPermission()">
          Allow Notifications
        </button>
      </div>

      <div class="app-nav">
        <button class="nav-btn active" onclick="switchView('table')">
          Table View
        </button>
        <button class="nav-btn" onclick="switchView('analytics')">
          Analytics
        </button>
        <button class="nav-btn" onclick="switchView('json')">
          JSON Editor
        </button>
        <button class="nav-btn" onclick="switchView('add')">
          ➕ Add Activity
        </button>
        <button class="nav-btn reminder-btn" onclick="switchView('reminders')">
          ⏰ Reminder History
        </button>
      </div>

      <div class="main-content">
        <!-- Table View -->
        <div id="tableView" class="view-section active">
          <div class="controls">
            <div class="search-box">
              <input
                type="text"
                id="searchInput"
                placeholder=" Search activities..."
                onkeyup="filterTable()"
              />
            </div>
            <div class="filter-group">
              <select id="dayFilter" onchange="filterTable()">
                <option value="">All Days</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
              </select>
            </div>
          </div>
          <div class="table-container" id="tableContainer"></div>
        </div>

        <!-- Analytics View -->
        <div id="analyticsView" class="view-section">
          <div class="stats-grid" id="statsContainer"></div>
          <div class="chart-container">
            <h3>Activities per Day</h3>
            <div class="day-chart" id="dayChart"></div>
          </div>
          <div class="chart-container">
            <h3>Most Common Activities</h3>
            <div class="day-chart" id="activityChart"></div>
          </div>
        </div>

        <!-- JSON View -->
        <div id="jsonView" class="view-section">
          <div class="controls">
            <button class="btn btn-primary" onclick="loadFromJSON()">
              Load from JSON
            </button>
            <button class="btn btn-success" onclick="copyJSON()">
              Copy JSON
            </button>
            <button class="btn btn-primary" onclick="exportToCSV()">
              Export CSV
            </button>
            <button class="btn btn-success" onclick="exportToJSON()">
              Export JSON
            </button>
            <button class="btn btn-warning" onclick="formatJSON()">
              ✨ Format JSON
            </button>
            <button class="btn btn-warning" onclick="resetToDefault()">Reset to Default</button>
          </div>
          <textarea
            id="jsonEditor"
            class="json-output"
            style="width: 100%; min-height: 400px; font-family: monospace"
          ></textarea>
        </div>

        <!-- Add Activity View -->
        <div id="addView" class="view-section">
          <div class="form-container">
            <h2>Add New Activity</h2>
            <form id="activityForm" onsubmit="addActivity(event)">
              <div class="form-group">
                <label for="day">Day *</label>
                <select id="day" required>
                  <option value="">Select a day</option>
                  <option value="Monday">Monday</option>
                  <option value="Tuesday">Tuesday</option>
                  <option value="Wednesday">Wednesday</option>
                  <option value="Thursday">Thursday</option>
                  <option value="Friday">Friday</option>
                  <option value="Saturday">Saturday</option>
                  <option value="Sunday">Sunday</option>
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="startTime">Start Time *</label>
                  <input type="time" id="startTime" required />
                </div>
                <div class="form-group">
                  <label for="endTime">End Time *</label>
                  <input type="time" id="endTime" required />
                </div>
              </div>
              <div class="form-group">
                <label for="activity">Activity *</label>
                <input
                  type="text"
                  id="activity"
                  placeholder="e.g., Study, Break, Sleep..."
                  required
                />
              </div>
              <div class="form-group">
                <label for="notes">Notes (Optional)</label>
                <textarea
                  id="notes"
                  placeholder="Additional details..."
                ></textarea>
              </div>
              <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                  <option value="Study">Study</option>
                  <option value="Class">Class</option>
                  <option value="Break">Break</option>
                  <option value="Sleep">Sleep</option>
                  <option value="Project">Project</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label>
                  <input type="checkbox" id="enableReminder" checked />
                  Enable reminders for this activity
                </label>
              </div>
              <button type="submit" class="btn btn-success" style="width: 100%">
                Add Activity
              </button>
            </form>
          </div>
        </div>

        <!-- Reminder History View -->
        <div id="remindersView" class="view-section">
          <div class="controls">
            <h2>Reminder History</h2>
            <button class="btn btn-danger" onclick="clearReminderHistory()">
              Clear History
            </button>
          </div>
          <div class="table-container" id="reminderHistory"></div>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Edit Activity</h2>
          <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="editForm" onsubmit="saveEdit(event)">
          <input type="hidden" id="editIndex" />
          <div class="form-group">
            <label for="editDay">Day *</label>
            <select id="editDay" required>
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="editStartTime">Start Time *</label>
              <input type="time" id="editStartTime" required />
            </div>
            <div class="form-group">
              <label for="editEndTime">End Time *</label>
              <input type="time" id="editEndTime" required />
            </div>
          </div>
          <div class="form-group">
            <label for="editActivity">Activity *</label>
            <input type="text" id="editActivity" required />
          </div>
          <div class="form-group">
            <label for="editNotes">Notes</label>
            <textarea id="editNotes"></textarea>
          </div>
          <div class="form-group">
            <label for="editCategory">Category</label>
            <select id="editCategory">
              <option value="Study">Study</option>
              <option value="Class">Class</option>
              <option value="Break">Break</option>
              <option value="Sleep">Sleep</option>
              <option value="Project">Project</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="editEnableReminder" checked />
              Enable reminders
            </label>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">
            Save Changes
          </button>
        </form>
      </div>
    </div>

    <script src="index.js">
       </script>
  </body>
</html>
